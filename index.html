<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .badge {
      display: inline-block;
      background: #10b981;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f8fafc;
    }

    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .link {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .link:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">GitHub Pages</span>
    <h1>Static Playground</h1>
    <p>This page is live on GitHub Pages. Add your HTML experiments here and push to deploy.</p>
    <a class="link" href="https://github.com/mishra-kunal1/static-playground">View on GitHub</a>
  </div>
</body>
</html>
