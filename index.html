<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .badge {
      display: inline-block;
      background: #10b981;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #0f172a;
    }

    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* --- Counter component --- */
    .counter {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .counter-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    .counter-display {
      font-size: 3rem;
      font-weight: 800;
      color: #6366f1;
      line-height: 1;
      margin-bottom: 20px;
      transition: transform 0.1s ease;
    }

    .counter-display.bump {
      transform: scale(1.15);
    }

    .counter-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      padding: 9px 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.96); }

    .btn-dec  { background: #fee2e2; color: #dc2626; }
    .btn-dec:hover  { background: #fecaca; }

    .btn-reset { background: #f1f5f9; color: #64748b; }
    .btn-reset:hover { background: #e2e8f0; }

    .btn-inc  { background: #e0e7ff; color: #4f46e5; }
    .btn-inc:hover  { background: #c7d2fe; }

    .link {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .link:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">GitHub Pages</span>
    <h1>Static Playground</h1>
    <p>JS runs fine on GitHub Pages — it's just the browser executing it. Try the counter below.</p>

    <div class="counter">
      <div class="counter-label">JS Counter</div>
      <div class="counter-display" id="count">0</div>
      <div class="counter-buttons">
        <button class="btn btn-dec"   onclick="change(-1)">− 1</button>
        <button class="btn btn-reset" onclick="reset()">Reset</button>
        <button class="btn btn-inc"   onclick="change(1)">+ 1</button>
      </div>
    </div>

    <a class="link" href="https://github.com/mishra-kunal1/static-playground">View on GitHub</a>
  </div>

  <script>
    let n = 0;
    const el = document.getElementById('count');

    function render() {
      el.textContent = n;
      el.classList.remove('bump');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('bump');
    }

    function change(delta) {
      n += delta;
      render();
    }

    function reset() {
      n = 0;
      render();
    }
  </script>
</body>
</html>
